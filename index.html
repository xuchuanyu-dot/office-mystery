<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office Theft Mystery - Can You Uncover the Truth?</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-image: url('background.jpg');
      background-size: cover;
      background-blend-mode: overlay;
      background-color: rgba(0,0,0,0.5);
      font-family: 'Noto Serif SC', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px;
      color: #f0f0f0;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 640px;
      margin-bottom: 28px;
      font-size: 0.95rem;
      color: #b0b0b0;
    }

    .scene-card {
      background: #0d0d0d;
      border-radius: 12px;
      padding: 28px 24px;
      max-width: 640px;
      width: 100%;
      margin-bottom: 32px;
      border: 1px solid #2a2a2a;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      min-height: 140px;
    }

    .scene-text {
      font-size: 1rem;
      color: #e0e0e0;
      white-space: pre-wrap;
    }

    .options-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 640px;
      width: 100%;
      margin-bottom: 24px;
    }

    .option-btn {
      flex: 1;
      min-width: 140px;
      padding: 14px 20px;
      font-family: inherit;
      font-size: 0.95rem;
      background: #2a2a2a;
      color: #e8e8e8;
      border: 1px solid #404040;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .option-btn:hover:not(:disabled) {
      background: #383838;
      border-color: #606060;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .feedback-box {
      max-width: 640px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 8px;
      text-align: center;
      font-size: 1rem;
      margin-bottom: 20px;
      display: none;
    }

    .feedback-box.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .feedback-box.correct {
      background: rgba(40, 80, 50, 0.6);
      border: 1px solid #4a7c5a;
      color: #a8e0b0;
    }

    .feedback-box.wrong {
      background: rgba(80, 40, 40, 0.6);
      border: 1px solid #7c5a5a;
      color: #e0b0b0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ending-screen {
      max-width: 560px;
      width: 100%;
      text-align: center;
      display: none;
    }

    .ending-screen.show {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    .ending-title {
      font-size: 1.25rem;
      margin-bottom: 16px;
      color: #e8e8e8;
    }

    .ending-text {
      font-size: 1rem;
      color: #c0c0c0;
      margin-bottom: 28px;
      white-space: pre-wrap;
    }

    .btn-primary {
      padding: 12px 28px;
      font-family: inherit;
      font-size: 1rem;
      background: #333;
      color: #e8e8e8;
      border: 1px solid #555;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: #444;
    }

    .support-btn {
      margin-top: 32px;
      padding: 12px 24px;
      font-family: inherit;
      font-size: 0.95rem;
      background: linear-gradient(135deg, #ff6b6b 0%, #ffa500 100%);
      color: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .support-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
    }

    .support-btn::before {
      content: "☕";
      font-size: 1.1rem;
    }

    .footer-note {
      margin-top: auto;
      padding-top: 32px;
      font-size: 0.75rem;
      color: #666;
      text-align: center;
    }

    .json-toggle-btn {
      margin-top: 20px;
      padding: 8px 16px;
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .json-toggle-btn:hover {
      background: #3a3a3a;
      color: #fff;
    }

    .json-viewer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      max-width: 800px;
      max-height: 80vh;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      padding: 20px;
      z-index: 1000;
      display: none;
      flex-direction: column;
    }

    .json-viewer.show {
      display: flex;
    }

    .json-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      color: #ccc;
      font-size: 1rem;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }

    .json-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
    }

    .json-close:hover {
      color: #fff;
    }

    .json-content {
      overflow: auto;
      background: #0d0d0d;
      border-radius: 8px;
      padding: 16px;
      color: #d4d4d4;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: calc(80vh - 80px);
    }

    .json-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
    }

    .json-overlay.show {
      display: block;
    }
  </style>
</head>
<body>
  <h1>Office Theft Mystery - Can You Uncover the Truth?</h1>

  <!-- Hidden audio element for typewriter sound -->
  <audio id="typewriter-sound" preload="auto" src="typewriter.mp3"></audio>

  <div class="header-bar">
    <span class="level-display">Level <span id="level-num">1</span> / <span id="level-total">10</span></span>
    <span class="score-display">Score: <span id="score">0</span></span>
  </div>

  <div class="scene-card">
    <p class="scene-text" id="scene-text"></p>
  </div>

  <div class="options-row">
    <button type="button" class="option-btn" id="opt-a" data-index="0"></button>
    <button type="button" class="option-btn" id="opt-b" data-index="1"></button>
    <button type="button" class="option-btn" id="opt-c" data-index="2"></button>
  </div>

  <div class="feedback-box" id="feedback">
    <span id="feedback-text"></span>
  </div>

  <div class="ending-screen" id="ending-screen">
    <p class="ending-title" id="ending-title">Truth Revealed</p>
    <p class="ending-text" id="ending-text"></p>
    <button type="button" class="btn-primary" id="play-again">Play Again</button>
  </div>

  <button class="json-toggle-btn" id="showJsonBtn">Show Question JSON</button>

  <a href="https://buymeacoffee.com/xuchuanyu9" class="support-btn" id="support-btn" target="_blank" rel="noopener">Support the Developer</a>

  <p class="footer-note">This game is suitable for players aged 13 and above. Some content is assisted by AI.</p>

  <!-- JSON Viewer Modal -->
  <div class="json-overlay" id="jsonOverlay"></div>
  <div class="json-viewer" id="jsonViewer">
    <div class="json-header">
      <span>Question Bank JSON Data</span>
      <button class="json-close" id="closeJsonBtn">&times;</button>
    </div>
    <pre class="json-content" id="jsonContent"></pre>
  </div>

  <script>
    // ========== Question Data ==========
    const questions = [
      {
        scene: "[Level 1: The Empty Coffee Cup]\nIt's Monday morning and you're about to savor your life-saving iced Americano—only to find the cup on your desk completely empty, with just a brown ring left behind. Suspects: Qiang, who just finished a sweaty run; intern Meng, who kept staring at your cup; and admin Zhang, who's sorting files. You notice a faint red mark on your cup lid.",
        options: [
          "Confront Qiang. He looks thirsty enough to drink a whole moat.",
          "Check Meng's lips and notice she's wearing a bold red lipstick today.",
          "Ask Zhang if she thought the cup was dirty and took it away to wash."
        ],
        correct_index: 1,
        correctFeedback: "[Correct] Meng's eyes dart away and she claims it was just a 'swatch test.' In truth, she stayed up late rushing a PPT, woke up with low blood sugar, and mistook your coffee for an emergency energy drink.",
        wrongFeedback: "[Wrong] Qiang may be thirsty, but he only drinks protein shakes. Zhang is busy sending out 'back-to-work' red packets and has no time for your ancient coffee cup."
      },
      {
        scene: "[Level 2: The Missing Power Bank]\nYour phone battery is down to 3%! The 'MegaCharge' power bank on your desk is gone. All that's left is a messy sticky note reading: '5F-B03, urgent!' You know 5F is Marketing and B03 is a meeting room. At the door you see three people: the director passionately presenting a PPT, a copywriter buried in revisions, and an HR rep scrolling on their phone in the corner.",
        options: [
          "Rush in and grab your power bank back—phone off equals social death.",
          "See whose phone is connected to a blue cable—your original data cable.",
          "Check the meeting room booking sheet to see who reserved B03."
        ],
        correct_index: 1,
        correctFeedback: "[Correct] You spot the copywriter's phone plugged into the blue cable, with a 'saved at last' expression. Their phone died while revising, nearly missing a barrage of calls from the boss.",
        wrongFeedback: "[Partially correct] The booking sheet only shows who scheduled the meeting, not who stole your power bank. And barging in to snatch it back? Get ready to write your resignation letter tomorrow."
      },
      {
        scene: "[Level 3: The Opened Package]\nYour long-awaited limited-edition figure has arrived—but the box is already opened and now empty. A few clear shredded paper bits are scattered nearby. Suspects: janitor Wang (currently cleaning the shredder), tech nerd Ming at the next desk (furiously typing with headphones on), and accountant Li (handing out snacks with a bag of silica-gel-like packets).",
        options: [
          "Search Ming's desk, suspecting he wanted a new decoration for his PC case.",
          "Check the shredded paper inside the shredder for fragments of your shipping label.",
          "Inspect Li's 'silica gel' to see if it's actually an accessory from your figure."
        ],
        correct_index: 1,
        correctFeedback: "[Correct] Among the shredded bits you find pieces showing your name! Wang mistook the box for trash and fed it straight into the shredder. Luckily, the figure was too heavy, slipped into a cardboard fold, and survived.",
        wrongFeedback: "[Wrong] Ming only cares about GPUs, not cute figures. Li is really holding silica gel—and she even gives you some spicy snacks to comfort your wounded soul."
      },
      {
        scene: "[Level 4: The 'Ghost' on Camera]\nYour labeled lunch box in the office fridge has been 'looted,' leaving only a couple of bitter melon slices. Security footage shows a shadow entering the pantry at 8 p.m., but an outage made the image blurry. All you can see is a glowing logo on the intruder's top. Three people match: a programmer in night-running gear, a designer in a collab T-shirt, and a security guard in a reflective vest.",
        options: [
          "Question the programmer—he often works late and always looks starving.",
          "Talk to the designer and notice a tiny carrot shred in his teeth, just like in your dish.",
          "Question the guard; the reflective vest should be brightest in the dark."
        ],
        correct_index: 1,
        correctFeedback: "[Correct] The designer not only has a carrot shred stuck, he even lets out a burp that smells like your secret spicy bean paste. He claims it was the 'price of inspiration.'",
        wrongFeedback: "[Wrong] The programmer was in the server room all night and never went to the pantry. The guard's vest has long strip logos, but the footage shows a round logo."
      },
      {
        scene: "[Level 5: Final Puzzle – The Vanished Bonus Plan]\nThe USB drive containing the annual salary-adjustment plan from your boss's computer has disappeared, throwing the whole company into panic. Three clues: 1) The door lock isn't broken. 2) There's a long orange cat hair on the floor. 3) A faint, sweet blueberry smell lingers in the air. Known facts: the boss owns a cat; secretary Su smokes blueberry-flavored cigarettes; janitor Wang has an orange cat; and VP Chen just ate a blueberry scone in the pantry.",
        options: [
          "Accuse secretary Su—she has both the blueberry smell and access to the boss's office.",
          "Suspect janitor Wang—the cat hair must have come from his cat.",
          "Observe the boss's cat and check VP Chen's suit pockets."
        ],
        correct_index: 2,
        correctFeedback: "[Correct] Case closed! The boss's cat batted the USB into Chen's suit pocket while he was bending over to talk. The blueberry smell came from his scone. The USB is found and the year-end bonus is saved.",
        wrongFeedback: "[Wrong] Su may seem suspicious, but she's allergic to cat hair and never goes near the boss's cat. Wang's cat has short hair, while the one you found is long. You almost framed the wrong guy."
      },
      {
        scene: "[Level 6: The Missing Red Marker]\nBefore an important client visit, you discover the only red marker on the meeting room whiteboard is gone—only black and blue remain. Footage shows only three people entered today: sales rep Liu for the morning stand-up, IT tech Zhao to adjust the projector, and the janitor delivering tea. On the board's edge, there's a fresh smear of red ink, as if something brushed against it.",
        options: [
          "Interrogate Liu, who loves using red to highlight key points.",
          "Check Zhao's work uniform pocket for a red marker.",
          "Ask the janitor if she took away a 'broken pen' to throw it out."
        ],
        correct_index: 1,
        correctFeedback: "[Correct] Zhao has the red marker in his pocket. He borrowed it to label some equipment while fixing the projector, then forgot to put it back, insisting he thought it was 'for everyone to use.'",
        wrongFeedback: "[Wrong] Liu is using his own signature pen today. The janitor only tossed out dried-up markers—the red smear came from when the working pen was pocketed."
      },
      {
        scene: "[Level 7: The 'Shared' Yogurt]\nYou kept a row of yogurt with your name on it on the second shelf of the fridge, but two bottles are missing and your name tag is torn. On the same shelf: fitness buff Jie's chicken breast, pregnant coworker Lin's fresh milk, and newbie intern Bai's snacks. There's a crooked note on the fridge door: 'Borrowed two, will return tomorrow~' written in shaky handwriting.",
        options: [
          "Ask Jie; fitness enthusiasts care most about protein intake.",
          "Ask Lin; pregnant women might suddenly crave yogurt.",
          "Compare the handwriting on Bai's sign-in sheet or notebook with the note."
        ],
        correct_index: 2,
        correctFeedback: "[Correct] Bai's handwriting matches the note exactly. He stayed late, got hungry, and was too shy to ask, so he 'borrowed' your yogurt and seriously marked 'return yogurt' on his calendar.",
        wrongFeedback: "[Wrong] Jie only drinks sugar-free yogurt, but yours is flavored. Lin has dietary restrictions on dairy. The wavy tilde on the note screams 'young intern habit.'"
      },
      {
        scene: "[Level 8: The Jammed Printer]\nYou waited half an hour in the print queue, only to get dozens of printouts of the same meme instead of your report. A half-torn A4 sheet is stuck at the output, with a partial fingerprint and a small coffee stain. Nearby at the time: front desk Mei, PM Wu who just finished a meeting, and legal officer Zheng printing contracts.",
        options: [
          "Suspect Mei; the front desk often prints bulk notices.",
          "Inspect Wu's right index finger for toner or paper dust.",
          "Ask Zheng if he selected the wrong file—those memes look like chat screenshots."
        ],
        correct_index: 1,
        correctFeedback: "[Correct] Wu's index finger still has toner and a faint coffee stain. He secretly tried to print his daughter's homework, but accidentally sent a meme from the team chat. When the printer jammed, he panicked and left the evidence.",
        wrongFeedback: "[Wrong] Mei was using another printer. Zheng prints only PDF contracts, so no memes. The fingerprint and coffee stain at the jam site are the real giveaway."
      },
      {
        scene: "[Level 9: The Cigarette in the Plant]\nSomeone stubbed a cigarette in your desk pothos, scorching the soil. The office is non-smoking—people either go downstairs or use vapes. Possible culprits: dev Zhou who recently quit smoking, designer Lin who's been stressed and slacking, and the property handyman who came to fix the AC. There's half a blurry shoe print along the plant pot's rim, as if someone tiptoed to reach something.",
        options: [
          "Question Zhou; failed quitters are most likely to sneak a smoke.",
          "Check the sole pattern of Lin's shoes and compare it with the print on the pot.",
          "Ask the handyman if he extinguished a cigarette in the pot while on the balcony."
        ],
        correct_index: 1,
        correctFeedback: "[Correct] The pattern on Lin's sole matches the print on the pot. She was anxious over a deadline and secretly smoked by the window. Unable to reach the trash can, she shoved the butt into your plant, then later bought you a new one as an apology.",
        wrongFeedback: "[Wrong] Zhou really did quit—he only has gum in his pocket. The handyman was fixing AC on another floor and never came to your area. The footprint points clearly to someone in sneakers, not work boots."
      },
      {
        scene: "[Level 10: Final Puzzle – Who Touched My Keyboard]\nSeveral commonly used keys (W, A, S, D) on your mechanical keyboard have been swapped to quiet red switches, while the others remain clicky blues. You definitely didn't change them. Last night, the only ones staying late were: your gaming buddy Wei, recently transferred newcomer Fang, and the boss who dropped by to grab a USB drive. Under the keyboard tray you find a receipt from an electronics mall for key switches, dated yesterday.",
        options: [
          "Suspect Wei; he might be pranking you or 'upgrading' your feel.",
          "Ask Fang if he borrowed your keyboard to practice typing and broke some keycaps.",
          "Check the membership number or note on the receipt to see whose purchase it was."
        ],
        correct_index: 2,
        correctFeedback: "[Correct] The membership number on the receipt belongs to Wei. He thought your blue switches were too loud and ruined his ability to hear footsteps in-game, so he secretly replaced your WASD with quiet reds and kept the receipt in case he needed to 'justify the upgrade.' Keyboard war: confirmed.",
        wrongFeedback: "[Wrong] Fang uses the standard membrane keyboard provided by the company. The boss only came in to grab a USB and never touched your keys. Quiet red switches on game keys scream 'gamer teammate motive.'"
      }
    ];

    const POINTS_CORRECT = 20;
    const FEEDBACK_DURATION = 2000;

    let currentLevel = 0;
    let score = 0;
    let answered = false;

    const levelNumEl = document.getElementById('level-num');
    const levelTotalEl = document.getElementById('level-total');
    const scoreEl = document.getElementById('score');
    const sceneTextEl = document.getElementById('scene-text');
    const optA = document.getElementById('opt-a');
    const optB = document.getElementById('opt-b');
    const optC = document.getElementById('opt-c');
    const feedbackEl = document.getElementById('feedback');
    const feedbackTextEl = document.getElementById('feedback-text');
    const endingScreen = document.getElementById('ending-screen');
    const endingTitleEl = document.getElementById('ending-title');
    const endingTextEl = document.getElementById('ending-text');
    const playAgainBtn = document.getElementById('play-again');

    // Audio element
    const typewriterSound = document.getElementById('typewriter-sound');

    function playTypewriterSound() {
      if (!typewriterSound) return;
      typewriterSound.currentTime = 0;
      typewriterSound.play().catch(error => {
        console.log('Sound playback failed (possibly browser restriction):', error);
      });
    }

    // JSON Viewer elements
    const showJsonBtn = document.getElementById('showJsonBtn');
    const jsonViewer = document.getElementById('jsonViewer');
    const jsonOverlay = document.getElementById('jsonOverlay');
    const jsonContent = document.getElementById('jsonContent');
    const closeJsonBtn = document.getElementById('closeJsonBtn');

    function displayJson() {
      jsonContent.textContent = JSON.stringify(questions, null, 2);
    }

    function openJsonViewer() {
      displayJson();
      jsonViewer.classList.add('show');
      jsonOverlay.classList.add('show');
    }

    function closeJsonViewer() {
      jsonViewer.classList.remove('show');
      jsonOverlay.classList.remove('show');
    }

    showJsonBtn.addEventListener('click', openJsonViewer);
    closeJsonBtn.addEventListener('click', closeJsonViewer);
    jsonOverlay.addEventListener('click', closeJsonViewer);

    // Game logic
    function showQuestion() {
      answered = false;
      const q = questions[currentLevel];
      levelNumEl.textContent = currentLevel + 1;
      levelTotalEl.textContent = questions.length;
      scoreEl.textContent = score;
      sceneTextEl.textContent = q.scene;

      playTypewriterSound();

      [optA, optB, optC].forEach((btn, i) => {
        btn.textContent = q.options[i] || '';
        btn.disabled = false;
        btn.style.display = q.options[i] ? 'inline-block' : 'none';
      });

      feedbackEl.classList.remove('show', 'correct', 'wrong');
      endingScreen.classList.remove('show');
    }

    function showFeedback(isCorrect, message) {
      feedbackEl.className = 'feedback-box show ' + (isCorrect ? 'correct' : 'wrong');
      feedbackTextEl.textContent = message;
      setTimeout(() => {
        feedbackEl.classList.remove('show');
        if (currentLevel < questions.length - 1) {
          currentLevel++;
          showQuestion();
        } else {
          showEnding();
        }
      }, FEEDBACK_DURATION);
    }

    function showEnding() {
      const totalPossible = questions.length * POINTS_CORRECT;
      const percent = totalPossible > 0 ? Math.round((score / totalPossible) * 100) : 0;
      let text = `Your final score: ${score} / ${totalPossible}.\n`;

      if (percent >= 80) {
        text += 'Your reasoning is sharp and methodical—you successfully reconstructed the whole case. The office theft mystery is solved!';
      } else if (percent >= 50) {
        text += 'You caught some key clues, but there\'s still room for improvement. Play again and aim for a perfect score.';
      } else {
        text += 'Solving a case takes logic and patience. Try again, and pay attention to how each choice fits into the chain of evidence.';
      }
      endingTitleEl.textContent = 'Truth Revealed';
      endingTextEl.textContent = text;
      endingScreen.classList.add('show');
    }

    function onOptionClick(index) {
      if (answered) return;
      answered = true;
      const q = questions[currentLevel];
      [optA, optB, optC].forEach(btn => { btn.disabled = true; });

      const isCorrect = index === q.correct_index;
      if (isCorrect) score += POINTS_CORRECT;
      showFeedback(isCorrect, isCorrect ? q.correctFeedback : q.wrongFeedback);
    }

    optA.addEventListener('click', () => onOptionClick(0));
    optB.addEventListener('click', () => onOptionClick(1));
    optC.addEventListener('click', () => onOptionClick(2));

    playAgainBtn.addEventListener('click', () => {
      currentLevel = 0;
      score = 0;
      showQuestion();
    });

    showQuestion();
  </script>
</body>
</html>
